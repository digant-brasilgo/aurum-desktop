<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AURUM — Jewellery Metal Tracking</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; background: #0a0a0f; }
    body { overflow: hidden; }
    #splash {
      position: fixed; inset: 0; background: #0a0a0f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash-title {
      font-family: 'Georgia', serif; font-size: 52px;
      color: #c8a850; letter-spacing: 8px; margin-bottom: 8px;
      animation: goldPulse 2s ease-in-out infinite;
    }
    #splash-sub {
      font-family: Arial, sans-serif; font-size: 13px;
      color: #888; letter-spacing: 3px; text-transform: uppercase;
    }
    #splash-bar {
      margin-top: 48px; width: 240px; height: 2px;
      background: #1a1a2e; border-radius: 1px; overflow: hidden;
    }
    #splash-progress {
      height: 100%; width: 0%; background: linear-gradient(90deg, #b8860b, #e8c84a);
      border-radius: 1px; transition: width 0.3s ease;
    }
    @keyframes goldPulse {
      0%, 100% { text-shadow: 0 0 20px rgba(200,168,80,0.3); }
      50% { text-shadow: 0 0 40px rgba(200,168,80,0.7), 0 0 80px rgba(200,168,80,0.2); }
    }
  </style>
</head>
<body>
  <div id="splash">
    <div id="splash-title">AURUM</div>
    <div id="splash-sub">Jewellery Metal Tracking &amp; Control</div>
    <div id="splash-bar"><div id="splash-progress"></div></div>
  </div>
  <div id="root"></div>
  <script>
    // Splash screen progress animation
    let p = 0;
    const bar = document.getElementById('splash-progress');
    const iv = setInterval(() => {
      p = Math.min(p + Math.random() * 15, 90);
      bar.style.width = p + '%';
    }, 200);
    window.__splashDone = () => {
      clearInterval(iv);
      bar.style.width = '100%';
      setTimeout(() => document.getElementById('splash').classList.add('hidden'), 400);
    };
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
